name: Scrape and Monitor

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  monitor_pipeline:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create Directory Structure
        run: mkdir -p data/raw data/processed data/new_scraped models metrics

      - name: Run Scraper (X/Twitter)
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python src/realtime_scraper.py

      - name: Commit Scraped Tweets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/new_scraped/
          git commit -m "Automated scrape: $(date -u '+%Y-%m-%d')" || echo "No new tweets"
          git push

      - name: Monitor for Drift
        id: monitoring
        run: python src/monitor.py
        continue-on-error: true

      - name: Commit Drift Report
        run: |
          git add metrics/drift_report.json
          git commit -m "Drift report: $(date -u '+%Y-%m-%d')" || echo "No changes"
          git push

      - name: Trigger Retraining on TRUBA (drift detected)
        if: steps.monitoring.outcome == 'failure'
        run: |
          gh workflow run retrain_truba.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
