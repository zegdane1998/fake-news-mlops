name: Scrape and Monitor

on:
  schedule:
    - cron: '0 0 * * 0'  # every Sunday — 4 runs/month × 10 tweets = 40 tweets (within free tier)
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  monitor_pipeline:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create Directory Structure
        run: mkdir -p data/raw data/processed data/new_scraped models metrics

      - name: Run Scraper (X/Twitter)
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: python src/realtime_scraper.py

      - name: Monitor Performance
        id: monitoring
        run: python src/monitor.py
        continue-on-error: true

      - name: Trigger Retraining (drift detected)
        if: steps.monitoring.outcome == 'failure'
        run: |
          python src/ingestion.py
          python src/preprocessing.py
          python src/train.py

      - name: Evaluate Retrained Model
        if: steps.monitoring.outcome == 'failure'
        run: python src/evaluate.py

      - name: Commit and Push Updates
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          touch data/new_scraped/.gitkeep
          git add data/new_scraped/ models/ metrics/
          git commit -m "Automated CT: Updated data and model artifacts" || echo "No changes to commit"
          git push
