name: Retrain on Vast.ai

on:
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v3

      - name: Install Vast.ai CLI
        run: pip install vastai

      - name: Authenticate Vast.ai
        run: vastai set api-key ${{ secrets.VASTAI_API_KEY }}

      - name: Find cheapest offer and launch instance (with retry)
        id: instance
        run: |
          INSTANCE_ID=""
          for attempt in 1 2 3; do
            echo "Attempt $attempt: searching for GPU offer..."
            OFFER_ID=$(vastai search offers \
              'reliability > 0.9 num_gpus = 2 gpu_name = RTX_3090 disk_space >= 20 cuda_vers >= 11.8' \
              --type on-demand --raw \
              | python3 -c "
          import sys, json
          offers = json.load(sys.stdin)
          offers.sort(key=lambda x: x['dph_total'])
          print(offers[0]['id'])
          ")
            echo "Trying offer: $OFFER_ID"

            RAW=$(vastai create instance "$OFFER_ID" \
              --image pytorch/pytorch:2.1.0-cuda11.8-cudnn8-runtime \
              --disk 20 \
              --raw \
              --onstart-cmd "bash -c 'curl -fsSL https://raw.githubusercontent.com/zegdane1998/fake-news-mlops/master/train_vastai.sh -o /root/train_vastai.sh && bash /root/train_vastai.sh ${{ secrets.GH_PAT }} > /root/train.log 2>&1'")

            echo "Raw response: $RAW"

            if [ -z "$RAW" ]; then
              echo "Empty response (offer likely taken). Retrying in 15s..."
              sleep 15
              continue
            fi

            INSTANCE_ID=$(echo "$RAW" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['new_contract'] if data.get('success') else '')
          " 2>/dev/null || echo "")

            if [ -n "$INSTANCE_ID" ]; then
              echo "Instance $INSTANCE_ID launched on offer $OFFER_ID"
              break
            fi

            echo "Create returned no instance ID. Retrying in 15s..."
            sleep 15
          done

          if [ -z "$INSTANCE_ID" ]; then
            echo "ERROR: Failed to launch instance after 3 attempts."
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Wait for training to finish
        run: |
          BEFORE_SHA="${{ github.sha }}"
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"
          echo "Polling every 2 min for BERTweet commit (up to 100 min)..."
          for i in $(seq 1 50); do
            sleep 120
            echo "--- Instance logs (last 20 lines) ---"
            vastai logs "$INSTANCE_ID" 2>/dev/null | tail -20 || echo "(no logs yet)"
            echo "-------------------------------------"
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/zegdane1998/fake-news-mlops/commits/master")
            LATEST_SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
            LATEST_MSG=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['commit']['message'])")
            echo "[$i/50] $LATEST_MSG"
            if [ "$LATEST_SHA" != "$BEFORE_SHA" ] && echo "$LATEST_MSG" | grep -qi "bertweet"; then
              echo "Training complete!"
              exit 0
            fi
          done
          echo "ERROR: Training did not complete within 100 minutes" && exit 1

      - name: Destroy instance
        if: always()
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"
          if [ -z "$INSTANCE_ID" ]; then
            echo "No instance to destroy."
            exit 0
          fi
          vastai destroy instance "$INSTANCE_ID"
          echo "Instance $INSTANCE_ID destroyed."
