name: Retrain on TRUBA

on:
  workflow_dispatch:   # triggered by scrape_and_monitor.yml when drift is detected

jobs:
  retrain:
    runs-on: self-hosted   # runs on the GitHub Actions runner installed on TRUBA

    steps:
      - name: Pull latest code
        run: |
          cd /arf/scratch/azegdane/fake-news-mlops
          git pull origin master

      - name: Activate environment and submit job
        run: |
          cd /arf/scratch/azegdane/fake-news-mlops
          source ~/.bashrc
          module load comp/python/miniconda3
          conda activate fake-news
          mkdir -p logs
          sbatch truba_job.sh

      - name: Report job submitted
        run: |
          echo "SLURM job submitted at $(date)"
          squeue -u azegdane
